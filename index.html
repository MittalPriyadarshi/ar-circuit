<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AR Circuit HUD</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
#ui {
    position:absolute;
    top:10px;
    left:10px;
    color:cyan;
    font-family:monospace;
}
canvas {
    position:absolute;
    top:0;
    left:0;
}
</style>
</head>

<body>

<div id="ui">
<p>🎮 X = Scan | A = Zoom In | B = Zoom Out</p>
<p id="status">READY</p>
<p id="confidence"></p>
<input type="file" id="upload">
</div>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const statusText = document.getElementById("status");
const confidenceText = document.getElementById("confidence");

let scale = 1;
let reference = new Image();
reference.src = "https://i.imgur.com/8QZ7Z8O.png"; // fallback sample

navigator.mediaDevices.getUserMedia({video:true})
.then(stream => video.srcObject = stream);

video.onloadeddata = () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    draw();
};

function draw(){
    ctx.save();
    ctx.scale(scale, scale);
    ctx.drawImage(video, 0, 0);
    ctx.restore();

    drawHUD();
    requestAnimationFrame(draw);
}

function drawHUD(){
    // grid
    ctx.strokeStyle="rgba(0,255,255,0.2)";
    for(let i=0;i<canvas.width;i+=40){
        ctx.beginPath();
        ctx.moveTo(i,0);
        ctx.lineTo(i,canvas.height);
        ctx.stroke();
    }

    // crosshair
    ctx.strokeStyle="lime";
    ctx.beginPath();
    ctx.moveTo(canvas.width/2-20,canvas.height/2);
    ctx.lineTo(canvas.width/2+20,canvas.height/2);
    ctx.moveTo(canvas.width/2,canvas.height/2-20);
    ctx.lineTo(canvas.width/2,canvas.height/2+20);
    ctx.stroke();
}

// ===== SCAN FUNCTION =====
function scan(){
    let imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
    let data = imgData.data;

    let errors = 0;

    for(let i=0;i<data.length;i+=4){
        let brightness = (data[i]+data[i+1]+data[i+2])/3;

        if(brightness < 60){ // dark regions = possible wires
            if(Math.random() < 0.02){ // simulate detection
                errors++;

                let x = (i/4)%canvas.width;
                let y = Math.floor((i/4)/canvas.width);

                ctx.fillStyle="rgba(255,0,0,0.7)";
                ctx.fillRect(x,y,5,5);
            }
        }
    }

    if(errors>50){
        statusText.innerText="❌ ERROR DETECTED";
        statusText.style.color="red";
    } else {
        statusText.innerText="✅ CIRCUIT OK";
        statusText.style.color="lime";
    }

    confidenceText.innerText="Errors: "+errors;
}

// ===== CONTROLS =====

// Keyboard fallback
window.addEventListener("keydown", e=>{
    if(e.key==="x") scan();
    if(e.key==="a") scale+=0.1;
    if(e.key==="b") scale-=0.1;
});

// Quest controller mapping
window.addEventListener("gamepadconnected", ()=>{
    setInterval(()=>{
        let gp = navigator.getGamepads()[0];
        if(!gp) return;

        if(gp.buttons[2].pressed) scan();   // X
        if(gp.buttons[0].pressed) scale+=0.02; // A
        if(gp.buttons[1].pressed) scale-=0.02; // B

    },100);
});

// Upload support
document.getElementById("upload").addEventListener("change", e=>{
    let file = e.target.files[0];
    let img = new Image();
    img.onload = ()=>{
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
    };
    img.src = URL.createObjectURL(file);
});
</script>

</body>
</html>
