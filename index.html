<!DOCTYPE html>
<html>
<head>
  <title>Circuit Validator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; background:black; overflow:hidden; font-family:Arial; }
    video { position:fixed; width:100vw; height:100vh; object-fit:cover; }
    canvas { position:fixed; top:0; left:0; }

    #result {
      position:fixed;
      top:20px;
      width:100%;
      text-align:center;
      color:white;
      font-size:22px;
      font-weight:bold;
      transition:0.2s;
    }

    #flash {
      position:fixed;
      width:100%;
      height:100%;
      background:white;
      opacity:0;
      pointer-events:none;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="flash"></div>
<div id="result">Press X / Trigger</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const result = document.getElementById("result");
const flash = document.getElementById("flash");

let canScan = true;

// CAMERA
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
}).then(stream => video.srcObject = stream);

// FIXED SIZE (important for consistency)
const W = 200, H = 150;

video.onloadedmetadata = () => {
  canvas.width = W;
  canvas.height = H;
};

// LOAD REFERENCE IMAGES (.jpeg supported)
let correctImg = new Image();
let wrongImg = new Image();

correctImg.src = "correct.jpeg";
wrongImg.src = "wrong.jpeg";

// FLASH ANIMATION
function flashAnim(){
  flash.style.opacity = 0.8;
  setTimeout(()=> flash.style.opacity = 0, 200);
}

// 🎯 GET CENTER REGION ONLY
function captureCenter(){
  let vw = video.videoWidth;
  let vh = video.videoHeight;

  let cw = vw * 0.5;   // center 50%
  let ch = vh * 0.5;

  let sx = (vw - cw) / 2;
  let sy = (vh - ch) / 2;

  ctx.drawImage(video, sx, sy, cw, ch, 0, 0, W, H);
}

// IMAGE COMPARE
function compare(img){
  let temp = document.createElement("canvas");
  temp.width = W;
  temp.height = H;
  let tctx = temp.getContext("2d");

  tctx.drawImage(img, 0, 0, W, H);
  let ref = tctx.getImageData(0,0,W,H).data;
  let cam = ctx.getImageData(0,0,W,H).data;

  let diff = 0;

  for(let i=0;i<cam.length;i+=4){
    diff += Math.abs(cam[i] - ref[i]); // red channel diff
  }

  return diff;
}

// SCAN
function scan(){
  if(!canScan) return;

  canScan = false;
  setTimeout(()=> canScan = true, 1200);

  result.innerText = "🔍 Scanning...";
  result.style.transform = "scale(1.2)";
  flashAnim();

  captureCenter();

  setTimeout(()=>{
    let d1 = compare(correctImg);
    let d2 = compare(wrongImg);

    if(d2 < d1){
      result.innerText = "❌ Incorrect Circuit";
    } else {
      result.innerText = "✅ Correct Circuit";
    }

    result.style.transform = "scale(1)";
  }, 250);
}

// 🎮 CONTROLS

// Laptop (X key)
document.addEventListener("keydown", e=>{
  if(e.key.toLowerCase() === "x"){
    scan();
  }
});

// Headset (trigger / tap)
document.body.addEventListener("click", ()=>{
  scan();
});
</script>

</body>
</html>
